<!DOCTYPE html>
<html>
<head>
    <title>RAG Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 400px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            margin-bottom: 15px;
        }

        #chat {
            height: 300px;
            overflow-y: auto;
            background: #0b1220;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background: #0f172a;
            color: white;
            font-size: 14px;
            outline: none;
        }

        button {
            padding: 10px 16px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            background: #334155;
            cursor: not-allowed;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 90%;
        }

        .msg.user {
            background: #1d4ed8;
            align-self: flex-end;
        }

        .msg.bot {
            background: #1e293b;
            align-self: flex-start;
            border: 1px solid #334155;
        }

        .msg.typing {
            background: #1e293b;
            align-self: flex-start;
            border: 1px solid #334155;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>RAG Chatbot</h2>
    <div id="chat"></div>
    <div class="input-row">
        <input id="msg" placeholder="Ask something..." />
        <button onclick="send()" id="sendBtn">Send</button>
    </div>
</div>

<script>
    var sessionId = null;

    document.getElementById("msg").addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            send();
        }
    });

    async function send() {
        var input = document.getElementById("msg");
        var text = input.value.trim();
        if (!text) return;

        var chat = document.getElementById("chat");
        var btn = document.getElementById("sendBtn");

        var userDiv = document.createElement("div");
        userDiv.className = "msg user";
        userDiv.innerHTML = "<b>You:</b> " + text;
        chat.appendChild(userDiv);

        input.value = "";
        btn.disabled = true;

        var typingDiv = document.createElement("div");
        typingDiv.className = "msg typing";
        typingDiv.id = "typing";
        typingDiv.innerHTML = "Bot is thinking...";
        chat.appendChild(typingDiv);
        chat.scrollTop = chat.scrollHeight;

        try {
            var res = await fetch("http://127.0.0.1:8000/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            var data = await res.json();

            var typing = document.getElementById("typing");
            if (typing) typing.remove();

            var botDiv = document.createElement("div");
            botDiv.className = "msg bot";

            if (data.reply) {
                botDiv.innerHTML = "<b>Bot:</b> " + data.reply;
            } else {
                botDiv.innerHTML = "<b>Error:</b> " + (data.detail || "Something went wrong");
            }

            chat.appendChild(botDiv);

        } catch (err) {
            var typing = document.getElementById("typing");
            if (typing) typing.remove();

            var errDiv = document.createElement("div");
            errDiv.className = "msg bot";
            errDiv.innerHTML = "<b>Error:</b> Could not connect to server.";
            chat.appendChild(errDiv);
        }

        chat.scrollTop = chat.scrollHeight;
        btn.disabled = false;
    }
</script>

</body>
</html>
